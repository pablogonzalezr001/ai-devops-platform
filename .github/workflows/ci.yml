name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKER_IMAGE: pablogonzalezr001/ai-service

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # importante para commits

      - name: Set up JDK 25
        uses: actions/setup-java@v3
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Build with Gradle
        run: |
          cd app/ai-service
          chmod +x gradlew
          ./gradlew build -x test

      - name: Prepare Image Tag
        id: prep
        run: |
          echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 🔐 LOGIN REAL A DOCKER
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 BUILD + PUSH REAL
      - name: Build and Push Docker Image
        run: |
          docker build -t $DOCKER_IMAGE:${{ env.TAG }} -f docker/Dockerfile .
          docker push $DOCKER_IMAGE:${{ env.TAG }}

      # 🛠️ Instalar yq (para editar YAML)
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      # 🔄 UPDATE MANIFEST + COMMIT
      - name: Update Manifests in Repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cd k8s/overlays/staging

          echo "Updating image tag to ${{ env.TAG }}"

          # 👉 Ajusta este path según tu YAML real
          yq -i '.images[0].newTag = "${{ env.TAG }}"' kustomization.yaml

          cd ../../..

          # Configurar git dinámicamente
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"

          git add .

          # Evitar error si no hay cambios
          git diff --cached --quiet || git commit -m "Update image tag to ${{ env.TAG }} [skip ci]"

          git push
